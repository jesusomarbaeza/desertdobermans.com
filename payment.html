<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Terms — Desert Dobermans</title>
  <link rel="icon" href="Settings/Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@300;400;600;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<section class="hero hero--short" id="top">
  <img class="hero__img" src="Settings/Cover.jpg" alt="Cover" />
  <div class="hero__content">
    <h1 class="hero__title" id="heroTitle">Payment Terms</h1>
  </div>
</section>

<section class="terms" id="terms">
  <div class="terms__inner" id="termsContent"></div>
</section>

<section class="reserve" id="acknowledge">
  <div class="reserve__inner">
    <h2 class="reserve__heading">Acknowledgment and Agreement</h2>
    <p class="terms__intro" id="paymentOutro" style="text-align:center; margin-bottom:32px;"></p>
    <form class="reserve__form" id="paymentForm" action="https://formsubmit.co/contact@desertdobermans.com" method="POST">
      <input type="hidden" name="_subject" value="Payment Terms Acknowledgment — Desert Dobermans" />
      <input type="hidden" name="_captcha" value="true" />
      <input type="hidden" name="_template" value="table" />
      <input type="text" name="_honey" style="display:none" />
      <div class="form__group">
        <label class="form__label" for="fullName">Name *</label>
        <input class="form__input" type="text" id="fullName" name="name" required autocomplete="name" />
      </div>
      <div class="form__group">
        <label class="form__label" for="phone">Phone *</label>
        <input class="form__input" type="tel" id="phone" name="phone" required autocomplete="tel" />
      </div>
      <div class="form__group">
        <label class="form__label" for="email">Email *</label>
        <input class="form__input" type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <button type="submit" class="btn btn--secondary form__submit">Submit Acknowledgment</button>
    </form>
    <div class="reserve__success" id="formSuccess" style="display:none;">
      <p>Thank you! Your acknowledgment has been submitted.</p>
    </div>
  </div>
</section>

<script src="site-common.js"></script>
<script>
  fetch('Settings/PaymentTerms/content.txt')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(t => renderSections(parseSections(t), 'termsContent', { titleId: 'heroTitle', outroId: 'paymentOutro' }))
    .catch(() => {
      document.getElementById('termsContent').innerHTML =
        '<p class="terms__fallback">Unable to load payment terms. Please try again later.</p>';
    })
    .finally(() => pageReady());
  handleFormSubmit('paymentForm', 'formSuccess');
</script>

</body>
</html>
